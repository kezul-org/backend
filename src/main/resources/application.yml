spring:
  application:
    name: kezul-backend
  profiles:
    active: local
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false  # 매칭되는 로케일이 없으면 기본(messages.properties) 사용
  threads:
    virtual:
      enabled: true  # Java 21+ Virtual Threads 활성화
  jpa:
    open-in-view: false  # OSIV 비활성화 (성능 이슈 방지)

app:
  auth:
    jwt:
      issuer: "kezul.com"
      secret-key: "v3ry-s3cr3t-k3y-f0r-k3zul-auth-s3ss10n-b3st-pr4ct1c3-!"
      access-token-expiration-minutes: 30
      refresh-token-expiration-days: 90

server:
  port: 8080

management:
  endpoints:
    web:
      base-path: /api/actuator
      exposure:
        include: health, info, modulith
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: Kezul Backend
    description: Kezul API Server
