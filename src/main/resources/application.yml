spring:
  application:
    name: kezul-backend
  # profiles.active는 여기에 절대 지정하지 않는다.
  # 실행 환경(로컬/CI/CD)에서 SPRING_PROFILES_ACTIVE 환경변수 또는
  # -Dspring.profiles.active=prod 인자로 지정한다.
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false  # 매칭되는 로케일이 없으면 기본(messages.properties) 사용
  threads:
    virtual:
      enabled: true  # Java 21+ Virtual Threads 활성화
  jpa:
    open-in-view: false  # OSIV 비활성화 (성능 이슈 방지)

server:
  port: 8080

management:
  endpoints:
    web:
      base-path: /api/actuator
      exposure:
        include: health, info, modulith
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: Kezul Backend
    description: Kezul API Server
