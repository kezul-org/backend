spring:
  application:
    name: kezul-backend
  profiles:
    default: local  # 프로필이 명시되지 않으면 local로 동작 (CI/CD에서 SPRING_PROFILES_ACTIVE로 오버라이드)
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false  # 매칭되는 로케일이 없으면 기본(messages.properties) 사용
  threads:
    virtual:
      enabled: true  # Java 21+ Virtual Threads 활성화
  jpa:
    open-in-view: false  # OSIV 비활성화 (성능 이슈 방지)

server:
  port: 8080

management:
  endpoints:
    web:
      base-path: /api/actuator
      exposure:
        include: health, info, modulith
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: Kezul Backend
    description: Kezul API Server
